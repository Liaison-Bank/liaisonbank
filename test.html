<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Line Animation</title>

<style>

.draw-line{
    width:60px;
    height:3px;
    background:#000;
    animation: drawLine 2s infinite ease-in-out;
}

@keyframes drawLine {

    /* Start hidden from left */
    0%{
        transform-origin:left;
        transform:scaleX(0);
    }

    /* Draw to full width */
    40%{
        transform-origin:left;
        transform:scaleX(1);
    }

    /* Hold full line */
    60%{
        transform-origin:right;
        transform:scaleX(1);
    }

    /* Shrink to right */
    100%{
        transform-origin:right;
        transform:scaleX(0);
    }

}

</style>
</head>

<body>

<div class="draw-line"></div>

</body>
</html>
